# Target Architecture: Sovereign-Master-32
paradigm: "llm"
layers:
# We will generate a 32-layer configuration programmatically 
# For brevity in the config file, we define the template
  layers.{idx}.attention.query: {role: "CONTEXT_QUERY", shape: [640, 640]}
  layers.{idx}.attention.key:   {role: "CONTEXT_KEY", shape: [640, 640]}
  layers.{idx}.attention.value: {role: "CONTEXT_VALUE", shape: [640, 640]}
  layers.{idx}.attention.out:   {role: "CONTEXT_OUTPUT", shape: [640, 640]}
  layers.{idx}.ffn.expand:      {role: "FFN_EXPAND", shape: [1728, 640]}
  layers.{idx}.ffn.contract:    {role: "FFN_CONTRACT", shape: [640, 1728]}
